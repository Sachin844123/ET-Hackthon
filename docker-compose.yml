version: "3.9"

# ═══════════════════════════════════════════════════════════════
# Attack Chain Autopsy Engine — Docker Compose Stack
# Services: Neo4j (graph DB) + FastAPI Backend + React Frontend
# Usage: docker-compose up --build
# ═══════════════════════════════════════════════════════════════

networks:
  autopsy-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  neo4j-plugins:
    driver: local
  chroma-data:
    driver: local

services:
  # ──────────────────────────────────────────────────────────────
  # Neo4j — Attack Knowledge Graph
  # APOC plugin enabled for advanced graph procedures
  # ──────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.21.0-community
    container_name: autopsy-neo4j
    restart: unless-stopped
    networks:
      - autopsy-net
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt protocol (driver connections)
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "2g"
      NEO4J_server_memory_pagecache_size: "512m"
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ──────────────────────────────────────────────────────────────
  # FastAPI Backend — Agent Orchestration Engine
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autopsy-backend
    restart: unless-stopped
    networks:
      - autopsy-net
    ports:
      - "8000:8000"   # FastAPI + Swagger UI at /docs
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      CHROMA_PATH: /app/chroma_db
      MITRE_ATTACK_STIX_PATH: /app/data/mitre/enterprise-attack.json
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEMO_MODE: ${DEMO_MODE:-true}
      BLAST_RADIUS_AUTO_THRESHOLD: ${BLAST_RADIUS_AUTO_THRESHOLD:-0.3}
      DATA_DIR: /app/data/synthetic
    volumes:
      - chroma-data:/app/chroma_db
      - ./data:/app/data:ro
      - ./backend:/app:cached
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  # ──────────────────────────────────────────────────────────────
  # React Frontend — Vite Dev Server
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autopsy-frontend
    restart: unless-stopped
    networks:
      - autopsy-net
    ports:
      - "5173:5173"   # Vite dev server
    environment:
      VITE_API_URL: http://backend:8000
      VITE_NEO4J_URL: http://localhost:7474
      IS_DOCKER: "true"
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev
